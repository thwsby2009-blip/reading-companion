<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 學習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #faf8f4;
  --ink: #1c1a17;
  --ink-2: #5c564d;
  --ink-3: #a8a29a;
  --rule: #e2ddd4;
  --gold: #9d7200;
  --surface: #fff;
  --n5: #4a9eff; --n4: #27ae60; --n3: #f39c12; --n2: #e67e22; --n1: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink);
}
.level-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.level-btn {
  font-size: 11px; font-weight: 600;
  padding: 5px 11px;
  border: 1px solid var(--rule);
  border-radius: 14px;
  background: var(--surface);
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
}
.level-btn:hover { border-color: var(--gold); color: var(--gold); }
.level-btn.active.n5 { background: var(--n5); border-color: var(--n5); color: #fff; }
.level-btn.active.n4 { background: var(--n4); border-color: var(--n4); color: #fff; }
.level-btn.active.n3 { background: var(--n3); border-color: var(--n3); color: #fff; }
.level-btn.active.n2 { background: var(--n2); border-color: var(--n2); color: #fff; }
.level-btn.active.n1 { background: var(--n1); border-color: var(--n1); color: #fff; }
.type-tabs { display: flex; gap: 4px; margin-left: auto; }
.type-btn {
  font-size: 11px; font-weight: 500;
  padding: 5px 13px;
  border: 1px solid var(--rule);
  border-radius: 14px;
  background: var(--surface);
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
}
.type-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; }
.main { padding: 20px 16px 70px; max-width: 620px; margin: 0 auto; }
.progress-bar { height: 3px; background: var(--rule); border-radius: 2px; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.3s; }
.progress-text { font-size: 11px; color: var(--ink-3); margin-bottom: 18px; }
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 24px 20px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.kanji { font-family: 'Noto Serif JP', serif; font-size: 2.1rem; font-weight: 700; line-height: 1.2; }
.kana { font-size: 0.9rem; color: var(--ink-2); margin-top: 4px; letter-spacing: 0.04em; }
.level-tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; color: #fff; }
.level-tag.n5 { background: var(--n5); }
.level-tag.n4 { background: var(--n4); }
.level-tag.n3 { background: var(--n3); }
.level-tag.n2 { background: var(--n2); }
.level-tag.n1 { background: var(--n1); }
.meaning {
  font-size: 0.98rem; color: var(--ink); font-weight: 500;
  padding: 10px 0; border-top: 1px solid var(--rule);
}
.example { margin-top: 12px; background: var(--paper); border-radius: 8px; padding: 12px 14px; }
.example-jp { font-family: 'Noto Serif JP', serif; font-size: 0.9rem; color: var(--ink); line-height: 1.7; }
.example-cn { font-size: 0.82rem; color: var(--ink-2); margin-top: 5px; line-height: 1.6; }
.grammar-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; padding: 22px 20px; margin-bottom: 14px; }
.grammar-card .pattern { font-family: 'Noto Serif JP', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold); }
.grammar-card .pattern-note { font-size: 0.78rem; color: var(--ink-3); margin-top: 4px; }
.grammar-card .meaning-gr { font-size: 0.93rem; color: var(--ink); font-weight: 500; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--rule); }
.grammar-card .example-gr { margin-top: 10px; background: var(--paper); border-radius: 8px; padding: 11px 14px; }
.grammar-card .example-gr-jp { font-size: 0.88rem; color: var(--ink); line-height: 1.7; font-family: 'Noto Serif JP', serif; }
.grammar-card .example-gr-cn { font-size: 0.8rem; color: var(--ink-2); margin-top: 4px; }
.end-card { text-align: center; padding: 48px 20px; }
.end-card .icon { font-size: 2.8rem; margin-bottom: 12px; }
.end-card h3 { font-size: 1rem; margin-bottom: 8px; }
.end-card p { font-size: 0.86rem; color: var(--ink-3); }
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--rule);
  padding: 10px 16px;
  display: flex; gap: 10px;
  max-width: 620px; margin: 0 auto;
}
.nav-btn {
  flex: 1; padding: 11px;
  border: 1px solid var(--rule); border-radius: 10px;
  background: var(--surface);
  font-size: 0.86rem; font-weight: 500;
  cursor: pointer; color: var(--ink); transition: all 0.15s;
}
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-btn.primary { background: var(--gold); border-color: var(--gold); color: #fff; }
</style>
</head>
<body>

<header>
  <h1>JLPT 學習</h1>
  <div class="level-tabs">
    <button class="level-btn n5 active" onclick="setLevel('n5')">N5</button>
    <button class="level-btn n4" onclick="setLevel('n4')">N4</button>
    <button class="level-btn n3" onclick="setLevel('n3')">N3</button>
    <button class="level-btn n2" onclick="setLevel('n2')">N2</button>
    <button class="level-btn n1" onclick="setLevel('n1')">N1</button>
  </div>
  <div class="type-tabs">
    <button class="type-btn active" onclick="setType('vocab')">單字</button>
    <button class="type-btn" onclick="setType('grammar')">文法</button>
  </div>
</header>

<div class="main">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">— / —</div>
  <div id="content"></div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="prev()" disabled>← 上一個</button>
  <button class="nav-btn primary" id="nextBtn" onclick="next()">下一個 →</button>
</div>

    { pattern:"～有關/～に関する",note:"關於",meaning:"關於～",ex_jp:"環境問題に関する會議を開いた。",ex_cn:"召開了關於環境問題的會議。"},
    { pattern:"～を踏まえて",note:"根據",meaning:"基於～",ex_jp:"実データを踏まえて検討する。",ex_cn:"基於實際數據來檢討。"},
    { pattern:"～也得/～也得なく",note:"無需",meaning:"不必～",ex_jp:"説明，还得上げる也得ない。",ex_cn:"不必多解釋。"},
  ],
  n1: [
    { pattern:"～いかんだ/～いかんで",note:"取決於",meaning:"取決於～",ex_jp:"状況いかんで判断する。",ex_cn:"取決於情況來判斷。"},
    { pattern:"～んばかりに/んばかり",note:"即將",meaning:"眼看就要～",ex_jp:"破裂んばかりの状態だった。",ex_cn:"眼看就要破裂的狀態。"},
    { pattern:"～をものともせず（して）",note:"克服",meaning:"不怕～",ex_jp:"艱難をものともせず前進した。",ex_cn:"不怕艱難向前進。"},
    { pattern:"～なくして（は）",note:"條件",meaning:"沒有～就沒有～",ex_jp:"努力なくして成功はない。",ex_cn:"沒有努力就沒有成功。"},
    { pattern:"～たalia/～aliaが",note:"雖然",meaning:"雖然～可是～",ex_jp:"知っていalia、执行しなかった。",ex_cn:"雖然知道，卻沒有實行。"},
    { pattern:"～顾不上/～に顧みず",note:"不管",meaning:"不顧～",ex_jp:"批判に顧みず実行した。",ex_cn:"不顧批判實行了。"},
    { pattern:"～きわまりない/きわまる",note:"極端",meaning:"極其～",ex_jp:"それは図々きわまりない要求だ。",ex_cn:"那是極其厚顏的要求。"},
    { pattern:"～までのことだ",note:"無所謂",meaning:"只不過是～罷了",ex_jp:"失敗しても逃げないまでのことだ。",ex_cn:"就算失敗也不過是不逃跑罷了。"},
    { pattern:"～ということだ",note:"結論",meaning:"也就是說～",ex_jp:"来月から値上がりするということです。",ex_cn:"也就是說從下個月開始漲價。"},
    { pattern:"～とは限らない",note:"反對",meaning:"不一定～",ex_jp:"有钱とは限らない。",ex_cn:"有錢人不一定幸福。"},
    { pattern:"～极まる/极ての",note:"程度",meaning:"極其～",ex_jp:"迷惑極まる行為だ。",ex_cn:"是極其惡意的行為。"},
    { pattern:"～に至る/至り",note:"到達",meaning:"直至～",ex_jp:"問題を指摘直至う。",ex_cn:"直至指出問題。"},
    { pattern:"～合って/も合って",note:"逆接",meaning:"雖然～也～",ex_jp:"興味合って、忙しくて参加できない。",ex_cn:"雖然有興趣，但忙得無法參加。"},
    { pattern:"～顾不上/～に顧みず",note:"不管",meaning:"不管～",ex_jp:"経費に顧みず、最善を尽くす。",ex_cn:"不管經費，盡最大努力。"},

    { pattern:"～を皮切りに",note:"開始",meaning:"以～為開端",ex_jp:"東京を皮切りに、全国でイベントが始まった。",ex_cn:"以東京為開端，全國開始了活動。"},
    { pattern:"～ましに",note:"越來越",meaning:"越來越～",ex_jp:"状況は悪化するましにだった。",ex_cn:"情況越來越惡化。"},
    { pattern:"～きらいがある",note:"傾向",meaning:"有～的傾向",ex_jp:"自分の考えに偏るきらいがある。",ex_cn:"有偏頗自己想法的傾向。"},
    { pattern:"～uance",note:"様態",meaning:"似乎～",ex_jp:"彼が嘘をついている可以看到ない。",ex_cn:"似乎可以看出他在說謊。"},
    { pattern:"～こなっている",note:"完成",meaning:"已經～完了",ex_jp:"形できていない。",ex_cn:"還沒有形成。"},
    { pattern:"～とされている",note:"認為",meaning:"被認為是～",ex_jp:"これは効果的とされている。",ex_cn:"這被認為是有效的。"},
    { pattern:"～折衝/～折衝の",note:"交渉",meaning:"～之交涉",ex_jp:"工事，工程與，折衝まった。",ex_cn:"與工程方交涉完了。"},
    { pattern:"～つ子里/～つ子里で",note:"一邊～一邊",meaning:"一邊～一邊～",ex_jp:"歩きつ子里で考えを纞めた。",ex_cn:"一邊走一邊整理思緒。"},
    { pattern:"～まみれ",note:"充滿",meaning:"充滿～",ex_jp:"汗まみれになった。",ex_cn:"滿身是汗。"},
    { pattern:"～のなんのって",note:"強調",meaning:"簡直是～不得了",ex_jp:"寒なんのって、手が凍える。",ex_cn:"簡直冷得凍手。"},
  ]
};

let currentLevel = 'n5';
let currentType = 'vocab';
let currentIndex = 0;

function setLevel(lvl) {
  currentLevel = lvl;
  currentIndex = 0;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.level-btn.${lvl}`).classList.add('active');
  update();
}

function setType(type) {
  currentType = type;
  currentIndex = 0;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.type-btn:nth-child(${type === 'vocab' ? 1 : 2})`).classList.add('active');
  update();
}

function getItems() {
  return currentType === 'vocab' ? VOCAB[currentLevel] : GRAMMAR[currentLevel];
}

function update() {
  const items = getItems();
  const total = items.length;
  document.getElementById('progressFill').style.width = total ? `${(currentIndex / total) * 100}%` : '0%';
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total} 已學習`;

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentIndex === 0;
  nextBtn.textContent = currentIndex >= total - 1 ? '重新開始 →' : '下一個 →';

  const el = document.getElementById('content');
  if (currentIndex >= total) {
    el.innerHTML = `<div class="end-card"><div class="icon">🎉</div><h3>${currentType === 'vocab' ? '單字' : '文法'}複習完畢！</h3><p>共 ${total} 個詞彙</p></div>`;
    return;
  }

  const item = items[currentIndex];
  if (currentType === 'vocab') {
    el.innerHTML = `<div class="card">
      <div class="card-top">
        <div>
          <div class="kanji">${item.kanji}</div>
          <div class="kana">${item.kana}</div>
        </div>
        <span class="level-tag ${currentLevel}">${currentLevel.toUpperCase()}</span>
      </div>
      <div class="meaning">${item.meaning}</div>
      <div class="example">
        <div class="example-jp">${item.ex_jp}</div>
        <div class="example-cn">${item.ex_cn}</div>
      </div>
    </div>`;
  } else {
    el.innerHTML = `<div class="grammar-card">
      <div class="pattern">${item.pattern}</div>
      <div class="pattern-note">${item.note || ''}</div>
      <div class="meaning-gr">${item.meaning}</div>
      <div class="example-gr">
        <div class="example-gr-jp">${item.ex_jp}</div>
        <div class="example-gr-cn">${item.ex_cn}</div>
      </div>
    </div>`;
  }
}

function prev() { if (currentIndex > 0) { currentIndex--; update(); } }
function next() { const items = getItems(); currentIndex = currentIndex >= items.length - 1 ? 0 : currentIndex + 1; update(); }

update();
</script>
</body>
</html>
