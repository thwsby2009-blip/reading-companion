<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>互動閱讀器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#f7f3ec;
  --ink:#1c1917;
  --ink-2:#57534e;
  --ink-3:#a8a29e;
  --rule:#e2ddd4;
  --gold:#b45309;
  --gold-bg:#fef3c7;
  --side:#f0ebe3;
  --mono:#f5f0e8;
}
html{font-size:16px}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── Header ── */
header{
  display:flex;
  align-items:center;
  padding:0 28px;
  height:56px;
  border-bottom:1px solid var(--rule);
  background:var(--mono);
  flex-shrink:0;
  gap:16px;
}
header select{
  font-family:'Inter',system-ui,sans-serif;
  font-size:13px;
  padding:5px 10px;
  border:1px solid var(--rule);
  border-radius:6px;
  background:#fff;
  color:var(--ink);
  cursor:pointer;
}
header select:hover{border-color:var(--ink-3)}
.speak-btn{
  font-size:17px;
  background:none;
  border:none;
  cursor:pointer;
  opacity:.5;
  padding:4px 8px;
  border-radius:6px;
  transition:opacity .2s,background .2s;
}
.speak-btn:hover{opacity:1;background:var(--rule)}
.speak-btn.active{opacity:1;color:var(--gold)}
header h1{
  font-size:14px;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-2);
  margin:0 auto;
}

/* ── Layout ── */
.main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── Article ── */
.article-wrap{
  flex:1;
  overflow-y:auto;
  padding:60px 80px;
}
.article-title{
  font-size:1.5rem;
  font-weight:600;
  color:var(--ink);
  margin-bottom:32px;
  letter-spacing:.01em;
}
.article-body{
  font-size:1.2rem;
  line-height:2.2;
  max-width:680px;
  color:var(--ink);
}
.article-body.japanese{
  font-family:'Noto Serif JP',serif;
  font-size:1.25rem;
}
.article-body.english{
  font-family:'EB Garamond','Georgia',serif;
  font-size:1.3rem;
  line-height:2.3;
}
.article-trans{
  margin-top:14px;
  padding:12px 16px;
  background:rgba(0,0,0,.03);
  border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;
  font-size:.9rem;
  color:var(--ink-2);
  line-height:1.7;
  display:none;
}
.article-trans.show{display:block}
.word{
  cursor:pointer;
  border-radius:2px;
  padding:1px 3px;
  margin:-1px -3px;
  transition:background .15s;
  display:inline;
}
.word:hover{background:var(--gold-bg);color:var(--gold)}
.word.done{background:#fef9ee}

/* ── Sidebar ── */
.sidebar{
  width:272px;
  flex-shrink:0;
  background:var(--side);
  border-left:1px solid var(--rule);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sidebar-head{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--rule);
}
.sidebar-head h2{
  font-size:12px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--ink-3);
  display:flex;
  align-items:center;
  gap:6px;
}
.sidebar-head h2 span{
  background:var(--gold);
  color:#fff;
  border-radius:10px;
  padding:1px 7px;
  font-size:11px;
}
.vocab-list{
  flex:1;
  overflow-y:auto;
  padding:10px 14px;
}
.vocab-empty{
  text-align:center;
  padding:40px 0;
  color:var(--ink-3);
  font-size:.85rem;
  font-style:italic;
}
.vocab-item{
  display:flex;
  align-items:center;
  padding:8px 10px;
  border-radius:6px;
  font-size:.85rem;
  cursor:pointer;
  transition:background .15s;
  gap:6px;
  position:relative;
}
.vocab-item:hover{background:var(--rule)}
.vocab-item .dot{
  font-size:10px;
  flex-shrink:0;
}
.vocab-item .dot.known{color:#65a30d}
.vocab-item .dot.learning{color:#d97706}
.vocab-item .wv{
  font-weight:600;
  color:var(--ink);
  flex-shrink:0;
}
.vocab-item .wt{
  color:var(--ink-2);
  font-size:.8rem;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.vocab-item .wvdel{
  margin-left:auto;
  opacity:0;
  color:var(--ink-3);
  font-size:.75rem;
  padding:2px 5px;
  border-radius:3px;
  transition:opacity .15s;
}
.vocab-item:hover .wvdel{opacity:1}
.vocab-item .wvdel:hover{background:#fecaca;color:#dc2626}

.sidebar-foot{
  padding:12px 14px;
  border-top:1px solid var(--rule);
}
.sidebar-foot button{
  width:100%;
  font-size:.8rem;
  color:var(--ink-3);
  background:none;
  border:1px solid var(--rule);
  border-radius:5px;
  padding:5px;
  cursor:pointer;
  font-family:inherit;
  transition:background .15s;
}
.sidebar-foot button:hover{background:#fecaca;color:#dc2626;border-color:#fecaca}
.sidebar-stats{
  padding:8px 14px;
  font-size:.75rem;
  color:var(--ink-3);
  display:flex;
  gap:12px;
}

/* ── Popup ── */
.popup{
  position:absolute;
  z-index:200;
  background:#fff;
  border:1px solid var(--rule);
  border-radius:10px;
  padding:16px 18px;
  width:230px;
  box-shadow:0 8px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}
.popup.show{opacity:1;pointer-events:auto}
.pw-word{
  font-size:1.15rem;
  font-weight:600;
  color:var(--ink);
  margin-bottom:2px;
  font-family:'Noto Serif JP',serif;
}
.pw-reading{
  font-size:.75rem;
  color:var(--ink-3);
  margin-bottom:6px;
  letter-spacing:.04em;
}
.pw-pos{
  display:inline-block;
  font-size:.7rem;
  background:var(--mono);
  color:var(--ink-2);
  border-radius:3px;
  padding:1px 6px;
  margin-bottom:8px;
}
.pw-trans{
  font-size:1rem;
  color:var(--ink);
  margin-bottom:6px;
  font-weight:500;
}
.pw-example{
  font-size:.8rem;
  color:var(--ink-2);
  font-style:italic;
  border-top:1px solid var(--rule);
  padding-top:8px;
  margin-top:4px;
  line-height:1.6;
}
.pw-btns{
  display:flex;
  gap:6px;
  margin-top:12px;
}
.pw-btns button{
  flex:1;
  font-size:.78rem;
  padding:5px 4px;
  border-radius:5px;
  cursor:pointer;
  font-family:inherit;
  transition:filter .15s;
  border:1px solid var(--rule);
}
.pw-btns button:hover{filter:brightness(.93)}
.pw-btns .know-btn{background:#f0fdf4;color:#15803d}
.pw-btns .again-btn{background:#fef9ee;color:#92400e}
.pw-btns .speak-btn-sm{background:#f5f0e8;color:var(--ink-2);flex:0 0 32px}

/* ── Responsive ── */
@media(max-width:700px){
  .article-wrap{padding:30px 22px}
  .sidebar{width:100%;height:220px;border-left:none;border-top:1px solid var(--rule)}
  .main{flex-direction:column}
  .vocab-list{display:flex;flex-wrap:wrap;gap:4px}
  .vocab-item{margin:0;font-size:.8rem;padding:4px 8px;background:#fff}
  .vocab-item .wt,.vocab-item .wvdel,.vocab-empty{display:none}
}

/* ── Scrollbar ── */
.vocab-list::-webkit-scrollbar{width:4px}
.vocab-list::-webkit-scrollbar-track{background:transparent}
.vocab-list::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px}
.article-wrap::-webkit-scrollbar{width:5px}
.article-wrap::-webkit-scrollbar-track{background:transparent}
.article-wrap::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}
</style>
</head>
<body>

<header>
  <select id="sel">
      <option value="0">東京的一天</option>
      <option value="1">日本の四季</option>
      <option value="2">旅行計画</option>
      <option value="3">在日本問路</option>
      <option value="4">商用メール</option>
      <option value="5">自己紹介</option>
    </select>
  <button class="speak-btn" id="btnSpeakAll" title="朗讀全文">🔊</button>
  <h1>互動閱讀器</h1>
</header>

<div class="main">
  <div class="article-wrap" id="awrap">
    <h2 class="article-title" id="atitle"></h2>
    <div class="article-body japanese" id="abody"></div>
    <div class="article-trans" id="atrans"></div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>📝 單字本 <span id="vcnt">0</span></h2>
    </div>
    <div class="vocab-list" id="vlist"></div>
    <div class="sidebar-stats" id="vstats"></div>
    <div class="sidebar-foot">
      <button onclick="clearVocab()">清除全部單字</button>
    </div>
  </aside>
</div>

<div class="popup" id="popup">
  <div class="pw-word" id="pw-word"></div>
  <div class="pw-reading" id="pw-reading"></div>
  <div id="pw-pos"></div>
  <div class="pw-trans" id="pw-trans"></div>
  <div class="pw-example" id="pw-ex"></div>
  <div class="pw-btns">
    <button class="again-btn" onclick="markWord('learning')">🔄 再記</button>
    <button class="know-btn" onclick="markWord('known')">✅ 記住了</button>
    <button class="speak-btn-sm" onclick="speakWord()" title="聽發音">🔊</button>
  </div>
</div>

// ─── State ────────────────────────────────────────────────────
let cur = 0;
let vocab = JSON.parse(localStorage.getItem('rc_vocab') || '{}');
let curWord = null;
let speaking = false;
let utt = null;

function init() {
  loadArticle(cur);
  renderVocab();
  document.getElementById('sel').value = cur;
  document.getElementById('sel').onchange = e => { loadArticle(+e.target.value); };
  document.addEventListener('click', e => {
    if (!e.target.closest('.word') && !e.target.closest('.popup')) hidePop();
  });
  document.getElementById('btnSpeakAll').onclick = toggleSpeakAll;
}

function loadArticle(i) {
  cur = i;
  const a = ARTICLES[i];
  document.getElementById('atitle').textContent = a.title;
  const bd = document.getElementById('abody');
  bd.className = 'article-body ' + (a.lang === 'japanese' ? 'japanese' : 'english');

  const toks = a.body.split(/([。、！？「」（）『』\s,.!?;:'"()-]+)/);
  bd.innerHTML = toks.map(t => {
    if (/^[。、！？「」（）『』\s,.!?;:'"()-]+$/.test(t) || t === '') return t;
    if (t.length > 1) return `<span class="word" data-w="${t.replace(/"/g,'"')}">${t}</span>`;
    return t;
  }).join('');

  bd.querySelectorAll('.word').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const w = el.dataset.w;
      if (vocab[w]) el.classList.add('done');
      showWord(w, el);
    });
  });

  // 顯示中文翻譯
  const transEl = document.getElementById('atrans');
  if (a.trans) {
    transEl.textContent = a.trans;
    transEl.classList.add('show');
  } else {
    transEl.textContent = '';
    transEl.classList.remove('show');
  }
}

function showWord(w, el) {
  curWord = w;
  const info = DICT[w];
  document.getElementById('pw-word').textContent = w;
  document.getElementById('pw-reading').textContent = info ? (info.r || '') : '';
  document.getElementById('pw-pos').innerHTML = info && info.p ? `<span class="pw-pos">${info.p}</span>` : '';
  document.getElementById('pw-trans').textContent = info ? info.t : '（詞庫中找不到）';
  document.getElementById('pw-ex').textContent = info && info.e ? info.e : '';

  // position
  const pop = document.getElementById('popup');
  const wrap = document.getElementById('awrap');
  const rc = el.getBoundingClientRect();
  const wc = wrap.getBoundingClientRect();
  let top = rc.bottom - wc.top + 8;
  let left = rc.left - wc.left;
  if (top + 260 > wrap.clientHeight) top = rc.top - wc.top - 200;
  if (left + 230 > wrap.clientWidth) left = wrap.clientWidth - 240;
  pop.style.top = top + 'px';
  pop.style.left = Math.max(8, left) + 'px';
  pop.classList.add('show');
}

function hidePop() {
  document.getElementById('popup').classList.remove('show');
  curWord = null;
}

function markWord(state) {
  if (!curWord) return;
  const info = DICT[curWord];
  vocab[curWord] = { t: info ? info.t : '', state };
  localStorage.setItem('rc_vocab', JSON.stringify(vocab));
  renderVocab();
  // mark in article
  document.querySelectorAll(`.word[data-w="${curWord}"]`).forEach(el => el.classList.add('done'));
  hidePop();
}

function removeWord(w) {
  delete vocab[w];
  localStorage.setItem('rc_vocab', JSON.stringify(vocab));
  renderVocab();
}

function renderVocab() {
  const list = document.getElementById('vlist');
  const cnt = document.getElementById('vcnt');
  const stats = document.getElementById('vstats');
  const ws = Object.keys(vocab);
  cnt.textContent = ws.length;
  const known = ws.filter(w => vocab[w].state === 'known').length;
  stats.innerHTML = `<span>🟢 ${known}</span><span>🟡 ${ws.length - known}</span>`;
  if (!ws.length) {
    list.innerHTML = '<div class="vocab-empty">點擊文章中的單字<br>就會收進這裡</div>';
    return;
  }
  list.innerHTML = ws.map(w => {
    const d = vocab[w];
    const dot = d.state === 'known' ? '🟢' : '🟡';
    return `<div class="vocab-item" onclick="removeWord('${w.replace(/'/g,"\\'")}')">
      <span class="dot ${d.state}">${dot}</span>
      <span class="wv">${w}</span>
      <span class="wt">${d.t}</span>
      <span class="wvdel">✕</span>
    </div>`;
  }).join('');
}

function clearVocab() {
  if (!confirm('清除所有單字？')) return;
  vocab = {};
  localStorage.setItem('rc_vocab', JSON.stringify(vocab));
  renderVocab();
  document.querySelectorAll('.word.done').forEach(el => el.classList.remove('done'));
}

function toggleSpeakAll() {
  if (!window.speechSynthesis) return;
  if (speaking) {
    window.speechSynthesis.cancel();
    speaking = false;
    document.getElementById('btnSpeakAll').classList.remove('active');
    return;
  }
  const a = ARTICLES[cur];
  // 用日文朗讀，不用中文
  window.speechSynthesis.cancel();
  const voices = window.speechSynthesis.getVoices();
  // 找日文語音
  const jaVoice = voices.find(v => v.lang.startsWith('ja')) || voices[0];
  const text = a.title + '。' + a.body;
  utt = new SpeechSynthesisUtterance(text);
  utt.lang = jaVoice ? jaVoice.lang : 'ja-JP';
  utt.voice = jaVoice;
  utt.rate = 0.85;
  utt.onend = () => { speaking = false; document.getElementById('btnSpeakAll').classList.remove('active'); };
  speaking = true;
  document.getElementById('btnSpeakAll').classList.add('active');
  window.speechSynthesis.speak(utt);
}

function speakWord() {
  if (!curWord || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja')) || voices[0];
  const u = new SpeechSynthesisUtterance(curWord);
  u.lang = jaVoice ? jaVoice.lang : (ARTICLES[cur].lang === 'japanese' ? 'ja-JP' : 'en-US');
  u.voice = jaVoice;
  u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

init();
