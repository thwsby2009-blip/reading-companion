<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>互動閱讀器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f2eb;--text:#2a2a2a;--accent:#c4a35a;
  --hover:#e8e4d9;--sel:#fff8dc;--sidebar:#faf8f3;
  --border:#e0d8c8;--muted:#888;--green:#5a8a5a;--yellow:#a89050
}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-selection{background:rgba(196,163,90,.25)}

/* header */
header{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--sidebar);flex-shrink:0;gap:8px;flex-wrap:wrap}
header select,header button{font-family:inherit;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;color:var(--text)}
header select:hover,header button:hover{background:var(--hover)}
header h1{font-size:16px;font-weight:600;color:var(--text);margin:0 auto}
header h1 span{color:var(--accent)}
.btn-speak{font-size:18px;background:none!important;border:none!important;padding:4px 8px;cursor:pointer;opacity:.7}
.btn-speak:hover{opacity:1}
.btn-speak.active{color:var(--accent);opacity:1}

/* main layout */
.main{display:flex;flex:1;overflow:hidden}
.article-wrap{flex:1;overflow-y:auto;padding:40px 60px}
.vocab{width:260px;flex-shrink:0;border-left:1px solid var(--border);background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden}
.vocab h2{font-size:14px;font-weight:600;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0}
.vocab h2 .cnt{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px}
.vocab-list{flex:1;overflow-y:auto;padding:8px}
.vocab-item{display:flex;align-items:center;padding:8px 10px;border-radius:6px;cursor:default;font-size:13px;margin-bottom:4px}
.vocab-item:hover{background:var(--hover)}
.vocab-item .word{font-weight:600;margin-right:6px}
.vocab-item .trans{color:var(--muted);font-size:12px}
.vocab-item .del{opacity:0;margin-left:auto;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:3px}
.vocab-item:hover .del{opacity:1}
.vocab-item .del:hover{background:#fcc;color}
.vocab-item.known .dot{color:var(--green)}
.vocab-item.learning .dot{color:var(--yellow)}
.vocab-item .dot{margin-right:5px}
.vocab-footer{padding:12px 16px;border-top:1px solid var(--border)}
.vocab-footer button{width:100%;font-size:12px;padding:6px;color:var(--muted);border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer}
.vocab-footer button:hover{background:#fcc}

/* article text */
.article-title{font-size:22px;font-weight:700;margin-bottom:20px;color:var(--text)}
.article-body{font-size:18px;line-height:2.1;max-width:680px}
.article-body.japanese{font-family:'Noto Serif JP','Hiragino Mincho Pro',serif}
.article-body.english{font-family:'EB Garamond',Georgia,serif;font-size:19px}
.w{ cursor:pointer;padding:1px 0;border-radius:3px;transition:background .1s }
.w:hover{background:var(--hover)}
.w.checked{background:var(--sel)}

/* popup */
.popup{position:absolute;z-index:100;background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;min-width:200px;max-width:260px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);opacity:0;transition:opacity .15s;pointer-events:none}
.popup.show{opacity:1;pointer-events:auto}
.popup-word{font-size:18px;font-weight:700;margin-bottom:2px}
.popup-reading{font-size:12px;color:var(--muted);margin-bottom:6px}
.popup-pos{font-size:11px;color:#fff;background:var(--accent);border-radius:3px;padding:1px 6px;margin-left:6px}
.popup-trans{font-size:15px;margin-bottom:8px}
.popup-example{font-size:13px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.popup-btns{display:flex;gap:6px;margin-top:10px}
.popup-btns button{flex:1;font-size:12px;padding:5px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:inherit}
.popup-btns .know{background:#e8f4e8;color:var(--green)}
.popup-btns .again{background:#f8f0d8;color:var(--yellow)}

/* stats bar */
.stats{padding:8px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;gap:16px}

/* mobile */
@media(max-width:700px){
  .main{flex-direction:column}
  .article-wrap{padding:24px 20px;flex:none}
  .vocab{width:100%;height:200px;border-left:none;border-top:1px solid var(--border)}
  .vocab-list{display:flex;flex-wrap:wrap;gap:4px}
  .vocab-item{margin:0;font-size:12px;padding:4px 8px;background:#fff}
  .vocab-item .trans,.vocab-item .del,.vocab-item .dot{display:none}
}
</style>
</head>
<body>
<header>
  <select id="sel"><option value="0">東京的一天（日文）</option><option value="1">日本的四季（日文）</option><option value="2">A Day in My Life（英文）</option></select>
  <button class="btn-speak" id="btnSpeakAll" title="朗讀全文">🔊</button>
  <h1>互動<span>閱讀</span>器</h1>
</header>
<div class="main">
  <div class="article-wrap" id="articleWrap">

    <div class="article-body japanese" id="articleBody"></div>
  </div>
  <div class="vocab">

    <div class="vocab-list" id="vocabList"></div>
    <div class="vocab-footer"><button onclick="clearVocab()">清除全部</button></div>
    <div class="stats" id="stats"></div>
  </div>
</div>
<div class="popup" id="popup">
  <div class="popup-word" id="pw"></div>
  <div class="popup-reading" id="pr"></div>
  <div id="ppos" style="display:inline-block;margin-bottom:6px"></div>
  <div class="popup-trans" id="pt"></div>
  <div class="popup-example" id="pex"></div>
  <div class="popup-btns">
    <button class="again" onclick="markWord('learning')">🔄 再記</button>
    <button class="know" onclick="markWord('known')">✅ 記住了</button>
    <button class="again" id="btnSpeakWord" onclick="speakWord()" title="聽發音">🔊</button>
  </div>
</div>

  "far":{p:"adjective/adverb",t:"遠",e:"The mountain is far."},
  "early":{p:"adjective/adverb",t:"早",e:"I wake up early."},
  "late":{p:"adjective/adverb",t:"遲",e:"I am late."}
};

// === 文章 ===
const ARTICLES = [
  {
    title:"東京的一天",
    lang:"japanese",
    body:"朝、私は咖啡を一杯飲みます。そして駅に向かって歩き始めます。駅はいつも人々が多く、電車も込みます。でも、 사람들은皆静かにしています。私は通勤電車の中で、本を読みます。会社では、ICの回路設計の仕事をしています。昼ごはんは同事と食堂で食べます。有时、街の小さな店に参ります。咖啡を飲みながら、勉强をこともあります。夜、家に帰ると、少し休憩します。そして日本语の文章を読みます。今日も東京での普通の日常でした。"
  },
  {
    title:"日本的四季",
    lang:"japanese", 
    body:"日本には美しい四季があります。春になると、桜が咲き、多くの人々が花見をします。公園や川沿いの道は花色で 가득になります。夏は暑くて湿度が高いです。海や山に遊びに行く人々が多いです。秋になると、街の公園や山々の紅葉が赤や黄色に染まります。涼しい風が吹き、散步にとても良い季節です。冬は雪が降る地域もあります。寒いですが、温泉に入るととても気持ちがよいです。どの季節もそれぞれの美しさがあります。"
  },
  {
    title:"A Day in My Life",
    lang:"english",
    body:"I wake up at six in the morning. First, I drink a cup of coffee. Then I get ready for work. I walk to the station because the office is near. The train is always crowded at this time. I read books on the train. I work in an office in the city. I have lunch with my friends at noon. Sometimes we go to a small shop near the office. In the evening, I walk home. The streets are quiet at night. After dinner, I read or watch movies. I always sleep at eleven. It is a simple but happy life."
  }
];

// === 狀態 ===
let currentArticle = 0;
let vocab = JSON.parse(localStorage.getItem('langreader_vocab') || '{}');
let currentWord = null;
let popupX = 0, popupY = 0;

// === 初始化 ===
function init(){
  loadArticle(currentArticle);
  renderVocab();
  document.getElementById('sel').value = currentArticle;
  document.getElementById('sel').onchange = e => { loadArticle(+e.target.value); };
  document.addEventListener('click', e => {
    if(!e.target.closest('.w') && !e.target.closest('.popup')) hidePopup();
  });
}

function loadArticle(idx){
  currentArticle = idx;
  const a = ARTICLES[idx];
  document.getElementById('articleTitle').textContent = a.title;
  const body = document.getElementById('articleBody');
  body.className = 'article-body ' + (a.lang === 'japanese' ? 'japanese' : 'english');
  
  let html = a.body;
  if(a.lang === 'japanese'){
    // wrap each word with click span
    const words = a.body.replace(/[。、！？「」（）「」『』]/g, m => m + ' ');
    const arr = [];
    // split by spaces but keep punctuation
    let tokens = a.body.split(/([。、！？「」（）「」『』\s])/);
    html = tokens.map(t => {
      if(/^[。、！？「」（）「」『』\s]+$/.test(t)) return t;
      if(t.length > 1) return `<span class="w" data-w="${t}">${t}</span>`;
      return t;
    }).join('');
  } else {
    // English - split by words
    html = a.body.split(/(\s+|[.,!?;:'"()-])/).map(t => {
      if(/^[.,!?;:'"()-]+$/.test(t) || /^\s+$/.test(t)) return t;
      if(t.length > 2) return `<span class="w" data-w="${t}">${t}</span>`;
      return t;
    }).join('');
  }
  
  body.innerHTML = html;
  
  // bind click
  body.querySelectorAll('.w').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const w = el.dataset.w;
      showWord(w, el);
    });
  });
}

function showWord(w, el){
  const info = DICT[w] || null;
  currentWord = w;
  
  const popup = document.getElementById('popup');
  const pw = document.getElementById('pw');
  const pr = document.getElementById('pr');
  const pt = document.getElementById('pt');
  const ppos = document.getElementById('ppos');
  const pex = document.getElementById('pex');
  
  pw.textContent = w;
  if(info){
    pr.textContent = info.r || '';
    pt.textContent = info.t || '';
    ppos.innerHTML = info.p ? `<span class="popup-pos">${info.p}</span>` : '';
    pex.textContent = info.e || '';
  } else {
    pr.textContent = '';
    pt.textContent = '（詞庫中沒有這個詞）';
    ppos.innerHTML = '';
    pex.textContent = '';
  }
  
  // position
  const rect = el.getBoundingClientRect();
  const wrap = document.getElementById('articleWrap');
  const wrapRect = wrap.getBoundingClientRect();
  
  let top = rect.bottom - wrapRect.top + 6;
  let left = rect.left - wrapRect.left;
  
  // if too low, show above
  if(top + 200 > wrap.clientHeight) top = rect.top - wrapRect.top - 200;
  // if too right, shift left
  if(left + 260 > wrap.clientWidth) left = wrap.clientWidth - 270;
  
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
  popup.classList.add('show');
  
  // check if already in vocab
  if(vocab[w]){
    const state = vocab[w].state;
    document.querySelectorAll('.popup-btns button').forEach(b => b.style.opacity = '0.4');
    if(state === 'known') document.querySelector('.popup-btns .know').style.opacity = '1';
    else document.querySelector('.popup-btns .again').style.opacity = '1';
  } else {
    document.querySelectorAll('.popup-btns button').forEach(b => b.style.opacity = '1');
  }
}

function hidePopup(){
  document.getElementById('popup').classList.remove('show');
  currentWord = null;
}

function markWord(state){
  if(!currentWord) return;
  const info = DICT[currentWord];
  vocab[currentWord] = { t: info ? info.t : '', state };
  localStorage.setItem('langreader_vocab', JSON.stringify(vocab));
  renderVocab();
  hidePopup();
}

function renderVocab(){
  const list = document.getElementById('vocabList');
  const count = document.getElementById('vocabCount');
  const stats = document.getElementById('stats');
  
  const words = Object.keys(vocab);
  count.textContent = words.length;
  
  const known = words.filter(w => vocab[w].state === 'known').length;
  const learning = words.length - known;
  stats.innerHTML = `<span>記住 ${known}</span><span>再記 ${learning}</span>`;
  
  list.innerHTML = words.map(w => {
    const d = vocab[w];
    const dot = d.state === 'known' ? '🟢' : '🟡';
    return `<div class="vocab-item ${d.state}" onclick="removeWord('${w.replace(/'/g,"\\'")}')">
      <span class="dot">${dot}</span>
      <span class="word">${w}</span>
      <span class="trans">${d.t}</span>
      <span class="del">✕</span>
    </div>`;
  }).join('');
}

function removeWord(w){
  delete vocab[w];
  localStorage.setItem('langreader_vocab', JSON.stringify(vocab));
  renderVocab();
}

function clearVocab(){
  if(!confirm('確定清除所有單字？')) return;
  vocab = {};
  localStorage.setItem('langreader_vocab', JSON.stringify(vocab));
  renderVocab();
}

// === 語音朗讀 ===
let currentUtterance = null;
let isSpeakingAll = false;

function speakWord(){
  if(!currentWord || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(currentWord);
  const lang = ARTICLES[currentArticle].lang;
  utt.lang = lang === 'japanese' ? 'ja-JP' : 'en-US';
  utt.rate = 0.8;
  window.speechSynthesis.speak(utt);
}

function speakArticle(){
  if(!window.speechSynthesis) return;
  if(currentUtterance && window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    isSpeakingAll = false;
    document.getElementById('btnSpeakAll').classList.remove('active');
    return;
  }
  const a = ARTICLES[currentArticle];
  const text = a.title + '。' + a.body;
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = a.lang === 'japanese' ? 'ja-JP' : 'en-US';
  currentUtterance.rate = 0.85;
  currentUtterance.onend = () => {
    isSpeakingAll = false;
    document.getElementById('btnSpeakAll').classList.remove('active');
  };
  isSpeakingAll = true;
  document.getElementById('btnSpeakAll').classList.add('active');
  window.speechSynthesis.speak(currentUtterance);
}

document.getElementById('btnSpeakAll').addEventListener('click', speakArticle);

init();
</script>
